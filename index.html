<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Segurança Digital — HQ Interativa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<main>
  <h1>Segurança Digital</h1>

  <!-- Barra de segurança -->
  <div id="barra-seguranca">
    <div id="nivel-seguranca"></div>
  </div>

  <!-- Texto / Narração -->
  <p id="texto"></p>

  <!-- Entrada de senha (ATO 4) -->
  <div id="senha-box" class="senha-box hidden">
    <input type="password" id="input-senha" placeholder="Digite a senha" />
    <button id="confirmar-senha">Confirmar</button>
  </div>

  <!-- Botões -->
  <div id="botoes"></div>

  <!-- Feedback -->
  <p id="feedback"></p>

  <!-- Relatório Final -->
  <section id="relatorio-final" class="hidden"></section>
</main>

<!-- IMPORTANTE: relatório antes do jogo -->
<script src="relatorio.js"></script>
<script src="game.js"></script>
</body>
</html>
